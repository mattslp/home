<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Page Not Found | Street Lamp</title>
  <link rel="stylesheet" href="https://use.typekit.net/wby1ytb.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #020202;
      --text:      #f5f0e8;
      --text-dim:  rgba(245,240,232,0.5);
      --text-faint:rgba(245,240,232,0.22);
      --rule:      rgba(245,240,232,0.1);
      --font:      'komet', 'Jost', sans-serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5em;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      gap: 32px;
      text-align: center;
    }

    #logo {
      width: 56px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    #logo:hover { opacity: 0.8; }

    #redirecting {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #redirecting p {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #redirecting a {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
    }

    #not-found {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #not-found h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      opacity: 0.15;
    }

    #not-found h2 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      line-height: 1;
    }

    #not-found p {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      max-width: 360px;
    }

    #not-found a {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
      transition: color 0.2s;
    }
    #not-found a:hover { color: var(--text); }
  </style>
</head>
<body>

  <a href="https://streetlamp.org">
    <svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1210" width="56">
      <path fill="#f5f0e8" opacity="0.35" d="M1315.82,76.28v956.28h-259.08c0,-242.15,93.17,-430.39,133.23,-500.08l42.65,-74.2l-73.14,-44.44c-34.42,-20.91,-102.39,-64.17,-170.86,-118.9c-79.61,-63.61,-133.93,-121.71,-161.49,-172.68l-24.86,-45.99h513.55Z"/>
      <path fill="#f5f0e8" opacity="0.35" d="M184.18,1032.56h259.08c0,-242.17,-93.17,-430.39,-133.23,-500.07l-42.65,-74.2l73.14,-44.44c34.42,-20.91,102.39,-64.17,170.85,-118.89c79.61,-63.62,133.94,-121.72,161.5,-172.69l24.86,-45.98H184.18v956.28Z"/>
      <path fill="#f5f0e8" d="M793.98,1032.56h175.08c0-265.62,104.07-472.75,144.89-543.77-36.94-22.44-108.08-67.8-180.07-125.33-89.22-71.3-150.67-138.03-183.89-199.48-33.22,61.45-94.66,128.18-183.89,199.48-71.99,57.54-143.13,102.89-180.07,125.33,40.82,71.02,144.89,278.15,144.89,543.77h175.22v87.69H184.18v87.69h1131.65v-87.69h-521.85v-87.69ZM793.98,487.29l228.52,51.56c-40.21,86.81-94.02,231.4-108.22,406.03h-120.3v-457.58ZM585.72,944.88c-14.2-174.63-68.01-319.22-108.22-406.03l228.78-51.62-.13,457.64h-120.43Z"/>
    </svg>
  </a>

  <div id="redirecting">
    <p>Taking you there…</p>
    <a id="redirect-link" href="#">Click here if you are not redirected</a>
  </div>

  <div id="not-found">
    <h2>404: Page Not Found</h2>
    <p>You've wandered backstage.</p>
    <a href="https://streetlamp.org">Let's get you back to the lobby.</a>
    <a href="https://streetlamp.org/#contact">Or did you need to speak to a staff member?</a>
  </div>

<script>
  // ── Redirect map — add old Squarespace slugs here ─────────────
  var REDIRECTS = {
    '/community-theatre':           'https://streetlamp.org/community',
    '/community-theater':           'https://streetlamp.org/community',
    '/slpaa-rising-sun':            'https://youth.streetlamp.org/program.html?loc=rs',
    '/slpaa-kennett':               'https://youth.streetlamp.org/program.html?loc=ksq',
    '/youth-productions':           'https://youth.streetlamp.org',
    '/summercamps':                 'https://youth.streetlamp.org/summercamps',
    '/summercamp':                  'https://youth.streetlamp.org/summercamps',
    '/shows':                       'https://shows.streetlamp.org',
    '/signage':                     'https://digitalsignage.streetlamp.org',
    '/digital-signage':             'https://digitalsignage.streetlamp.org',
  };

  var path = window.location.pathname.toLowerCase().replace(/\/$/, '') || '/';
  var destination = REDIRECTS[path];

  if (destination) {
    // Show redirect UI
    document.title = 'Redirecting…';
    document.getElementById('redirecting').style.display = 'flex';
    document.getElementById('redirect-link').href = destination;
    document.getElementById('redirect-link').textContent = destination.replace('https://', '');
    // Redirect after brief pause
    setTimeout(function() {
      window.location.replace(destination);
    }, 800);
  } else {
    // Show 404 UI
    document.getElementById('not-found').style.display = 'flex';
  }
</script>
</body>
</html>

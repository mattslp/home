<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<link rel="stylesheet" href="https://use.typekit.net/wby1ytb.css">
<title>Street Lamp — Lobby Display</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #020202;
    --text:     #f5f0e8;
    --text-dim: rgba(245,240,232,0.5);
    --youth:    #cc3399;
    --community:#00aa99;
    --gold:     #cc9900;
    --font:     'komet', 'Jost', sans-serif;
    --w: 1920px;
    --h: 1080px;
  }
.slide-info-eyebrow,
.slide-info-title,
.slide-info-meta-label,
.slide-info-meta-value,
.slide-sponsor-heading,
.slide-sponsor-tier-label,
.slide-sponsor-names,
#status-time,
#status-weather,
#status-holiday {
  text-shadow: 0 2px 16px rgba(0,0,0,0.8), 0 1px 8px rgba(0,0,0,0.9);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
  html, body {
    width: var(--w);
    height: var(--h);
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    color: var(--text);
    cursor: none;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* ── Status bar ── */
  #status-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 96px;
    z-index: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    background: linear-gradient(to bottom, rgba(2,2,2,0.85) 0%, rgba(2,2,2,0) 100%);
    font-family: var(--font);
    pointer-events: none;
  }

  #status-time {
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text);
  }

  #status-weather {
    display: flex;
    align-items: center;
    gap: 32px;
    font-size: 1.9rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  #status-weather-current {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  #status-weather-temp {
    font-weight: 600;
    font-size: 2.4rem;
  }

  #status-weather-desc {
    color: var(--text-dim);
  }

  #status-weather-divider {
    width: 1px;
    height: 36px;
    background: rgba(245,240,232,0.2);
  }

  /* ── Slideshow container ── */
  #slideshow {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* ── Individual slides ── */
  .slide {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    opacity: 0;
    transition: opacity 1.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide.active   { opacity: 1; z-index: 2; }
  .slide.outgoing { opacity: 0; z-index: 1; }


  /* ── Progress bar ── */
  #progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: rgba(245,240,232,0.2);
    z-index: 500;
    width: 0%;
    transition: none;
  }

  /* ── IMAGE SLIDES ── */
  .slide-image {
    background: var(--bg);
  }

  /* Background version — fills screen, blurred, faded */
  .slide-image-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.25;
    filter: grayscale(0%);
    animation: kenBurnsBg 12s ease-in-out forwards;
  }

  .slide-image img.slide-image-fg {
    position: absolute;
    z-index: 2;
    top: 96px;
    left: 0;
    width: 100%;
    height: calc(100vh - 96px - 80px);
    object-fit: cover;
    object-position: center center;
    display: block;
  }

  .slide-image {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes kenBurns {
    0%   { transform: scale(1.0) translateX(0px); }
    50%  { transform: scale(1.0) translateX(-12px); }
    100% { transform: scale(1.0) translateX(12px); }
  }

  /* ── INFO SLIDES (events/auditions) ── */
  .slide-info {
    background: var(--bg);
    flex-direction: column;
    align-items: flex-start;
    padding: 120px 160px;
    overflow: hidden;
  }

  .slide-info-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.25;
    filter: grayscale(0%);
    animation: kenBurnsBg 12s ease-in-out forwards;
  }

  @keyframes kenBurnsBg {
    0%   { transform: scale(1.05) translateX(-8px); }
    100% { transform: scale(1.12) translateX(8px); }
  }

  .slide-info-eyebrow {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
  }

  .slide.active .slide-info-eyebrow {
    opacity: 1;
    transform: translateY(0);
  }

  .slide-info-eyebrow.youth     { color: var(--youth); }
  .slide-info-eyebrow.community { color: var(--community); }
  .slide-info-eyebrow.camps     { color: var(--gold); }

  .slide-info-title {
    font-size: 7rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 0.95;
    text-transform: uppercase;
    color: var(--text);
    max-width: 1200px;
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
  }

  .slide.active .slide-info-title {
    opacity: 1;
    transform: translateY(0);
  }

  .slide-info-meta {
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease 0.75s, transform 0.6s ease 0.75s;
  }

  .slide.active .slide-info-meta {
    opacity: 1;
    transform: translateY(0);
  }

  .slide-info-meta-item {
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .slide-info-meta-label {
    font-size: 2.2rem;
    font-weight: 600;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
  }

  .slide-info-meta-value {
    font-size: 3.6rem;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }

  /* Accent line */
  .slide-info-accent {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 6px;
  }

  .slide-info-accent.youth      { background: var(--youth); }
  .slide-info-accent.rising-sun { background: var(--youth); }
  .slide-info-accent.community  { background: var(--community); }
  .slide-info-accent.kennett    { background: var(--community); }
  .slide-info-accent.camps      { background: var(--gold); }
  .slide-info-accent.sponsor    { background: var(--gold); }

  .slide-info-eyebrow.rising-sun { color: var(--youth); }
  .slide-info-eyebrow.kennett    { color: var(--community); }

  /* ── SPONSOR SLIDE ── */
  .slide-sponsor {
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 60px 160px;
    gap: 0;
    justify-content: center;
    overflow: hidden;
  }

  .slide-sponsor-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.18;
    pointer-events: none;
  }

  .slide-sponsor-bg svg {
    width: 110%;
    height: auto;
  }

  .slide-sponsor-heading {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
  }

  .slide.active .slide-sponsor-heading {
    opacity: 1;
    transform: translateY(0);
  }

  .slide-sponsor-tier {
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(12px);
  }

  .slide.active .slide-sponsor-tier:nth-child(2) { transition: opacity 0.5s ease 0.5s, transform 0.5s ease 0.5s; opacity: 1; transform: translateY(0); }
  .slide.active .slide-sponsor-tier:nth-child(3) { transition: opacity 0.5s ease 0.65s, transform 0.5s ease 0.65s; opacity: 1; transform: translateY(0); }
  .slide.active .slide-sponsor-tier:nth-child(4) { transition: opacity 0.5s ease 0.8s, transform 0.5s ease 0.8s; opacity: 1; transform: translateY(0); }
  .slide.active .slide-sponsor-tier:nth-child(5) { transition: opacity 0.5s ease 0.95s, transform 0.5s ease 0.95s; opacity: 1; transform: translateY(0); }
  .slide.active .slide-sponsor-tier:nth-child(6) { transition: opacity 0.5s ease 1.1s, transform 0.5s ease 1.1s; opacity: 1; transform: translateY(0); }

  .slide-sponsor-tier-label {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
    margin-bottom: 16px;
  }

  .slide-sponsor-names {
    font-size: 3.2rem;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: rgba(245,240,232,0.85);
    line-height: 1.3;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* ── CAMPS SLIDE ── */
  .slide-camps {
    background: var(--bg);
    flex-direction: column;
    align-items: flex-start;
    padding: 120px 160px;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 900;
    transition: opacity 0.8s ease;
  }

  #loading-logo {
    width: 480px;
    animation: loadpulse 1.8s ease-in-out infinite;
  }

  @keyframes loadpulse {
    0%, 100% { opacity: 0.15; }
    50%       { opacity: 0.5; }
  }
  /* ── Quote bar ── */
  #quote-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    z-index: 600;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 60px;
    background: linear-gradient(to top, rgba(2,2,2,0.85) 0%, transparent 100%);
    font-family: var(--font);
    pointer-events: none;
    overflow: hidden;
  }

  #quote-group {
    display: flex;
    align-items: flex-end;
    gap: 24px;
    overflow: hidden;
  }

  #quote-text {
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: rgba(245,240,232,0.7);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  #quote-attribution {
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(245,240,232,0.35);
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  /* ── QR slide ── */
  .slide-qr {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    background: #000;
    position: absolute;
    top: 96px;
    left: 0;
    right: 0;
    bottom: 80px;
    overflow: hidden;
  }

  .slide-qr-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    position: relative;
    z-index: 1;
  }

  .slide-qr-eyebrow {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
  }

  .slide-qr-title {
    font-size: 4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: #f5f0e8;
    text-align: center;
  }

  .slide-qr-url {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.4);
  }




  /* ── Persistent QR ── */
  #persistent-qr {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 610;
    opacity: 0.6;
    transition: opacity 0.8s ease;
  }

</style>
  <script src="https://unpkg.com/@bitjson/qr-code@1.0.2/dist/qr-code.js"></script>
</head>

  function parseLine(line) {
    var cols = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    return cols;
  }

  function parseCSV(text) {
    var lines = text.trim().split('\n').filter(function(l) { return l.trim(); });
    if (lines.length < 2) return [];
    var headers = parseLine(lines[0]).map(function(h) { return h.replace(/^"|"$/g,'').trim().toLowerCase().replace(/\s+/g,'_'); });
    return lines.slice(1).map(function(line) {
      var cols = parseLine(line);
      var obj = {};
      headers.forEach(function(h, i) { obj[h] = (cols[i] || '').replace(/^"|"$/g,'').trim(); });
      return obj;
    }).filter(function(r) { return Object.values(r).some(function(v) { return v; }); });
  }

  function driveUrl(raw) {
    if (!raw) return '';

    return m ? 'https://lh3.googleusercontent.com/d/' + m[1] + '=w1920' : raw;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;

  }

  // ── Date helpers ─────────────────────────────────────────
  function parseDate(str) {
    if (!str) return null;

    return isNaN(d.getTime()) ? null : d;

  function isExpired(row) {

  }

  function sortByStart(rows) {
    return rows.slice().sort(function(a, b) {
      var da = parseDate(a.start_date), db = parseDate(b.start_date);

      if (!da) return 1;

  // ── Slideshow engine ──────────────────────────────────────
  var slides = [];
  var current = 0;
  var timer = null;
  var progressTimer = null;
  var slideshow = document.getElementById('slideshow');
  var progressBar = document.getElementById('progress-bar');

  function showSlide(index) {
    slides.forEach(function(slide, i) {
      slide.classList.remove('active', 'outgoing');
      if (i === index) {
        slide.classList.add('active');
        slide.dispatchEvent(new Event('slideActivated'));
        // Hide persistent QR on the QR slide
        var pqr = document.getElementById('persistent-qr');
        if (pqr) pqr.style.opacity = slide.classList.contains('slide-qr') ? '0' : '0.6';
        // Restart Ken Burns animations on all images in the slide
        slide.querySelectorAll('img').forEach(function(img) {
          var anim = img.style.animation || window.getComputedStyle(img).animation;
          img.style.animation = 'none';
          img.offsetHeight;
          img.style.animation = '';
        });
      }
    });

    var duration = slides[index].classList.contains('slide-image') ? IMAGE_DURATION : INFO_DURATION;
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    progressBar.offsetHeight;
    progressBar.style.transition = 'width ' + duration + 'ms linear';
    progressBar.style.width = '100%';

    clearTimeout(timer);
    timer = setTimeout(function() {
      current = (current + 1) % slides.length;
      showSlide(current);
    }, duration);
  }


  function buildQRSlide() {
    var slide = document.createElement('div');
    slide.className = 'slide slide-qr';
    slide.innerHTML = [
      '<div class="slide-qr-content">',
      '  <qr-code',
      '    contents="https://streetlamp.org"',
      '    module-color="#f5f0e8"',
      '    position-ring-color="#cc9900"',
      '    position-center-color="#ffffff"',
      '    mask-x-to-y-ratio="1.2"',
      '    style="width:40vh;height:40vh;background:#000;"',
      '  ></qr-code>',
      '  <p class="slide-qr-title">Visit Our Website</p>',
      '  <p class="slide-qr-url">streetlamp.org</p>',
      '</div>',
    ].join('');

    // Animate and populate weather when slide becomes active
    slide.addEventListener('slideActivated', function() {
      var qr = slide.querySelector('qr-code');
      if (qr && qr.animateQRCode) {
        qr.animateQRCode('RadialRippleIn');
      } else if (qr) {
        qr.addEventListener('codeRendered', function() {
          qr.animateQRCode('RadialRippleIn');
        }, { once: true });
      }

    });

    return slide;
  }

  function buildSlides(data) {
    var result = [];

    // Events
    sortByStart((data.events || []).filter(function(e) { return !isExpired(e); })).forEach(function(e) {
      if (!e.name) return;
      var cls = companyClass(e.company);
      var meta = [];
      if (e.dates) meta.push({ label: 'Performance Date(s)', value: e.dates });
      result.push({ type: 'info', slide: buildInfoSlide('Tickets Available', e.name, meta, cls, e.image_url) });
    });

    // Auditions
    sortByStart((data.auditions || []).filter(function(a) {
      return (!a.active || a.active.toLowerCase() !== 'no') && !isExpired(a);
    })).forEach(function(a) {
      if (!a.name) return;
      var cls = companyClass(a.company);
      var isSoon = (a.active || '').toLowerCase() === 'soon';
      var eyebrow = isSoon ? 'Audition Info Coming Soon' : 'Now Auditioning';
      var meta = [];
      if (a.dates) meta.push({ label: 'Performance Date(s)', value: a.dates });
      if (a.label) meta.push({ label: 'Location', value: a.label });
      result.push({ type: 'info', slide: buildInfoSlide(eyebrow, a.name, meta, cls, a.image_url) });
    });

    // Camps — one slide per camp with venue color
    sortByStart((data.camps || []).filter(function(c) { return !isExpired(c) && (c.soldout || '').toLowerCase() !== 'yes'; })).forEach(function(c) {
      if (!c.name) return;
      var meta = [];
      if (c.dates) meta.push({ label: 'Dates', value: c.dates });
      if (c.ages)  meta.push({ label: 'Ages',  value: c.ages  });
      var loc = (c.label || '').toLowerCase();
      var campClass = loc.indexOf('kennett') > -1 ? 'kennett'
                    : loc.indexOf('rising')  > -1 ? 'rising-sun'
                    : 'camps';
      var eyebrow = c.label ? 'Summer Camps  ·  ' + c.label : 'Summer Camps';
      result.push({ type: 'info', slide: buildInfoSlide(eyebrow, c.name, meta, campClass, c.image_url) });
    });

    // Sponsors — one slide per tier
    if (data.sponsorGroups && data.sponsorGroups.length) {
      data.sponsorGroups.forEach(function(g) {
        result.push({ type: 'sponsor', slide: buildSponsorSlide(g.tier, g.names) });
      });
    }

    // Image slides from Drive folder
    (data.signageIds || []).forEach(function(id) {
      result.push({ type: 'image', slide: buildImageSlide('https://lh3.googleusercontent.com/d/' + id + '=w3840-h2160') });
    });

    // Interleave: add an image after every 2 info slides
    var interleaved = [];
    var imgSlides = result.filter(function(s) { return s.type === 'image'; });
    var infoSlides = shuffle(result.filter(function(s) { return s.type !== 'image'; }));
    var imgIdx = 0;
    imgSlides = shuffle(imgSlides);

    infoSlides.forEach(function(s, i) {
      interleaved.push(s.slide);
      if ((i + 1) % 2 === 0 && imgIdx < imgSlides.length) {
        interleaved.push(imgSlides[imgIdx++].slide);
      }
    });
    // Append remaining images at the end
    while (imgIdx < imgSlides.length) interleaved.push(imgSlides[imgIdx++].slide);

    var finalSlides = interleaved.length ? interleaved : infoSlides.map(function(s) { return s.slide; });

    // Insert QR slide every 10 slides, and always at the end
    var withQR = [];
    finalSlides.forEach(function(slide, i) {
      withQR.push(slide);
      if ((i + 1) % 10 === 0) withQR.push(buildQRSlide());
    });
    withQR.push(buildQRSlide());

    return withQR.length ? withQR : finalSlides;
  }
(function() {
  var HOLIDAYS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0tCEKCsvAN0vdjSwhc8BWE52sbWjqb3gTdYU5m2w-YcazUKvZh0GGuMaHNc-w-RE6u_yGxJ82zUPy/pub?gid=1832146325&single=true&output=csv';

  function parseLine(line) {
    var cols = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    return cols.map(function(c) { return c.replace(/^"|"$/g,'').trim(); });
  }

  function showHolidayList(items) {
    var el = document.getElementById('status-holiday');
    if (!el) return;

    if (!items || !items.length) { el.style.display = 'none'; return; }

    el.style.display = '';

    function formatItem(item) {
      if (item.type === 'birthday')   return 'Happy birthday ' + item.text + '!';
      if (item.type === 'nowplaying') return 'Now Playing: ' + item.text;
      return 'Happy ' + item.text + '!';
    }

    if (items.length === 1) {
      el.textContent = formatItem(items[0]);
      return;
    }

    var idx = 0;
    function showNext() {
      // Fade out
      el.style.opacity = '0';
      setTimeout(function() {
        // Update text
        el.textContent = formatItem(items[idx]);
        idx = (idx + 1) % items.length;
        // Fade in
        el.style.opacity = '1';
      }, 500);
    }

    showNext();
    setInterval(showNext, 8000);
  }

  fetch(HOLIDAYS_CSV)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var lines = text.trim().split('\n');
      var headers = parseLine(lines[0]).map(function(h) { return h.toLowerCase().trim(); });
      var dateIdx     = headers.indexOf('date');
      var holidayIdx  = headers.indexOf('holiday');
      var birthdayIdx = headers.indexOf('birthday');
      if (dateIdx === -1) return;

      var now   = new Date();
      var month = String(now.getMonth() + 1).padStart(2, '0');
      var day   = String(now.getDate()).padStart(2, '0');
      var today = month + '-' + day;

      var todayItems = [];
      lines.slice(1).forEach(function(line) {
        var cols    = parseLine(line);
        var date    = (cols[dateIdx] || '').trim();
        if (!date) return;
        var m = date.match(/(?:\d{4}[\-\/])?0*(\d{1,2})[\-\/]0*(\d{1,2})/);
        if (!m) return;
        var key = String(m[1]).padStart(2,'0') + '-' + String(m[2]).padStart(2,'0');
        if (key !== today) return;
        var holiday  = holidayIdx  > -1 ? (cols[holidayIdx]  || '').trim() : '';
        var birthday = birthdayIdx > -1 ? (cols[birthdayIdx] || '').trim() : '';
        if (holiday) holiday.split(',').forEach(function(h) {
          h = h.trim();
          if (h) todayItems.push({ type: 'holiday', text: h });
        });
        if (birthday) birthday.split(',').forEach(function(b) {
          b = b.trim();
          if (b) todayItems.push({ type: 'birthday', text: b });
        });
      });

      // Merge in any now-playing shows — poll briefly if main data not yet loaded
      function mergeAndShow(todayItems, attempts) {
        if (window._nowPlayingItems !== undefined || attempts >= 20) {
          var allItems = todayItems.concat(window._nowPlayingItems || []);
          showHolidayList(allItems);
        } else {
          setTimeout(function() { mergeAndShow(todayItems, attempts + 1); }, 250);
        }
      }
      mergeAndShow(todayItems, 0);
    })
    .catch(function() {
      var el = document.getElementById('status-holiday');
      if (el) el.style.display = 'none';
    });
})();
  // ── Fetch images from Drive folder ───────────────────────
  function fetchSignageImages() {
    var params = new URLSearchParams({
      q: "'" + SIGNAGE_FOLDER_ID + "' in parents and trashed=false and mimeType contains 'image/'",
      fields: 'files(id,name)',
      key: DRIVE_API_KEY,
      pageSize: 100,
      supportsAllDrives: 'true',
      includeItemsFromAllDrives: 'true'
    });
    return fetch('https://www.googleapis.com/drive/v3/files?' + params)
      .then(function(r) { return r.json(); })
      .then(function(data) { return (data.files || []).map(function(f) { return f.id; }); })
      .catch(function() { return []; });
  }

  // ── Load all data ─────────────────────────────────────────
  var loading = document.getElementById('loading');

  var TIER_ORDER = ['Season Sponsor','Show Sponsor','Rights Sponsor','Music Sponsor','Costumes Sponsor','Props Sponsor'];
  var TIER_AMOUNTS = {
    'Season Sponsor':   '$10,000 and up',
    'Show Sponsor':     '$5,000 – $9,999',
    'Rights Sponsor':   '$2,500 – $4,999',
    'Music Sponsor':    '$1,000 – $2,499',
    'Costumes Sponsor': '$500 – $999',
    'Props Sponsor':    '$250 – $499',
  };

  Promise.all([
    Promise.all(Object.keys(URLS).map(function(key) {
      return fetch(URLS[key]).then(function(r) { return r.text(); }).then(function(text) {
        return { key: key, data: parseCSV(text) };
      }).catch(function() { return { key: key, data: [] }; });
    })),
    fetchSignageImages()
  ]).then(function(results) {
    var csvResults = results[0];
    var imageIds   = results[1];

    var data = {};
    csvResults.forEach(function(r) { data[r.key] = r.data; });
    data.signageIds = shuffle(imageIds);

    // Camps active check — show if any row has active=yes OR no active column at all
    data.campsActive = data.camps.some(function(c) {
      return (!c.active || c.active.toLowerCase() !== 'no') && !isExpired(c);
    });
    data.camps = data.camps.filter(function(c) {
      return (!c.active || c.active.toLowerCase() !== 'no') && !isExpired(c);
    });

    // Sponsor groups
    var sponsorMap = {};
    data.sponsors.filter(function(s) { return s.name && (s.active || '').toLowerCase() === 'yes'; })
      .forEach(function(s) {
        var t = s.tier || 'Sponsor';
        if (!sponsorMap[t]) sponsorMap[t] = [];
        sponsorMap[t].push(s.name);
      });
    data.sponsorGroups = [];
    TIER_ORDER.forEach(function(tier) {
      if (sponsorMap[tier]) data.sponsorGroups.push({ tier: tier, names: sponsorMap[tier] });
    });
    Object.keys(sponsorMap).forEach(function(tier) {
      if (TIER_ORDER.indexOf(tier) === -1) data.sponsorGroups.push({ tier: tier, names: sponsorMap[tier] });
    });

    slides = buildSlides(data);

    // Build "Now Playing" items from events with matching run dates
    var nowPlaying = [];
    var todayLocal = new Date();
    todayLocal.setHours(0,0,0,0);
    (data.events || []).forEach(function(e) {
      if (!e.start_date || !e.end_date) return;
      var start = new Date(e.start_date + 'T00:00:00');
      var end   = new Date(e.end_date   + 'T00:00:00');
      end.setDate(end.getDate() + 1); // stop showing day after end_date
      if (todayLocal >= start && todayLocal < end && e.name) {
        nowPlaying.push({ type: 'nowplaying', text: e.name });
      }
    });
    window._nowPlayingItems = nowPlaying;

    // Pre-render all slides into the DOM at once
    slides.forEach(function(slide) { slideshow.appendChild(slide); });

    // Fade out loading screen
    loading.style.opacity = '0';
    setTimeout(function() {
      loading.style.display = 'none';
      if (slides.length) showSlide(0);
    }, 800);
  });

  // ── Keyboard navigation ───────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (!slides.length) return;
    if (e.key === 'ArrowLeft') {
      current = (current - 1 + slides.length) % slides.length;
      clearTimeout(timer);
      showSlide(current);
    } else if (e.key === 'ArrowRight') {
      current = (current + 1) % slides.length;
      clearTimeout(timer);
      showSlide(current);
    }
  });

})();

(function() {
  var timeEl = document.getElementById('status-time');
  function tick() {

// ── Weather (Open-Meteo, ZIP 21911 → lat/lon) ─────────────
(function() {
  // Rising Sun, MD 21911
  var LAT = 39.6987, LON = -76.0584;

  var WMO_DESC = {
    0:'Clear', 1:'Mostly Clear', 2:'Partly Cloudy', 3:'Overcast',
    45:'Foggy', 48:'Icy Fog',
    51:'Light Drizzle', 53:'Drizzle', 55:'Heavy Drizzle',
    61:'Light Rain', 63:'Rain', 65:'Heavy Rain',
    71:'Light Snow', 73:'Snow', 75:'Heavy Snow', 77:'Snow Grains',
    80:'Light Showers', 81:'Showers', 82:'Heavy Showers',
    85:'Snow Showers', 86:'Heavy Snow Showers',
    95:'Thunderstorm', 96:'Thunderstorm', 99:'Thunderstorm'
  };

  function desc(code) { return WMO_DESC[code] || 'Unknown'; }

  function buildForecast(hourlyTimes, hourlyTemps, hourlyCodes, hourlyPrecip) {
    var now = new Date();
    var lookahead = 6; // hours to look ahead
    var rainHour = null;
    var snowHour = null;

    for (var i = 0; i < hourlyTimes.length; i++) {
      var t = new Date(hourlyTimes[i]);
      var diffH = (t - now) / 3600000;
      if (diffH < 0 || diffH > lookahead) continue;
      var code = hourlyCodes[i];
      var precip = hourlyPrecip[i];
      if (!rainHour && precip > 0.1 && code >= 51 && code < 70) rainHour = t;
      if (!snowHour && precip > 0.1 && code >= 71 && code < 78) snowHour = t;
    }

    if (rainHour) {
      var diffMin = Math.round((rainHour - now) / 60000);
      if (diffMin < 30) return 'Rain starting soon';
      var h = rainHour.getHours(), ap = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return 'Rain expected at ' + h + ap;
    }
    if (snowHour) {
      var diffMin2 = Math.round((snowHour - now) / 60000);
      if (diffMin2 < 30) return 'Snow starting soon';
      var h2 = snowHour.getHours(), ap2 = h2 >= 12 ? 'PM' : 'AM';
      h2 = h2 % 12 || 12;
      return 'Snow expected at ' + h2 + ap2;
    }

    // Look at temp trend over next 3 hours
    var temps = [];
    for (var j = 0; j < hourlyTimes.length; j++) {
      var t2 = new Date(hourlyTimes[j]);
      var diff2 = (t2 - now) / 3600000;
      if (diff2 >= 0 && diff2 <= 3) temps.push(hourlyTemps[j]);
    }
    if (temps.length >= 2) {
      var delta = temps[temps.length - 1] - temps[0];
      if (delta >= 5) return 'Warming up';
      if (delta <= -5) return 'Cooling down';
    }
    return 'No significant changes';
  }

  function fetchWeather() {
    var url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + LAT + '&longitude=' + LON
      + '&current=temperature_2m,weathercode'
      + '&hourly=temperature_2m,weathercode,precipitation'
      + '&temperature_unit=fahrenheit'
      + '&forecast_days=1'
      + '&timezone=America%2FNew_York';

    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var temp = Math.round(data.current.temperature_2m);
        var code = data.current.weathercode;
        window._weatherCode = code;
        var forecast = buildForecast(
          data.hourly.time,
          data.hourly.temperature_2m,
          data.hourly.weathercode,
          data.hourly.precipitation
        );
        document.getElementById('status-weather-temp').textContent = temp + '°F';
        document.getElementById('status-weather-desc').textContent = desc(code);
        var showForecast = forecast && forecast !== 'No significant changes';
        document.getElementById('status-weather-forecast').textContent = showForecast ? forecast : '';
        document.getElementById('status-weather-divider').style.display = showForecast ? '' : 'none';
        document.getElementById('status-weather-forecast').style.display = showForecast ? '' : 'none';
      })
      .catch(function() {
        document.getElementById('status-weather-forecast').textContent = '';
      });
  }

  fetchWeather();
  setInterval(fetchWeather, 10 * 60 * 1000);
})();

// ── Theatre quotes ────────────────────────────────────────────
(function() {
  var QUOTES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0tCEKCsvAN0vdjSwhc8BWE52sbWjqb3gTdYU5m2w-YcazUKvZh0GGuMaHNc-w-RE6u_yGxJ82zUPy/pub?gid=544167978&single=true&output=csv';

  var quotes = [];
  var currentIdx = 0;

  function parseLine(line) {
    var cols = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    return cols.map(function(c) { return c.replace(/^"|"$/g,'').trim(); });
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function showQuote() {
    if (!quotes.length) return;
    var q = quotes[currentIdx % quotes.length];
    var textEl = document.getElementById('quote-text');
    var attrEl = document.getElementById('quote-attribution');

    // Slide down and fade out
    textEl.style.opacity = '0';
    textEl.style.transform = 'translateY(10px)';
    attrEl.style.opacity = '0';
    attrEl.style.transform = 'translateY(10px)';

    setTimeout(function() {
      textEl.textContent = '\u201C' + q.quote + '\u201D';
      var attr = [];
      if (q.character) attr.push(q.character);
      if (q.show)      attr.push(q.show);
      attrEl.textContent = attr.join('  \u00b7  ');

      // Reset to above, then slide down into place
      textEl.style.transition = 'none';
      attrEl.style.transition = 'none';
      textEl.style.transform = 'translateY(-10px)';
      attrEl.style.transform = 'translateY(-10px)';

      textEl.offsetHeight; // force reflow

      textEl.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      attrEl.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      textEl.style.opacity = '1';
      textEl.style.transform = 'translateY(0)';
      attrEl.style.opacity = '1';
      attrEl.style.transform = 'translateY(0)';
    }, 500);

    currentIdx++;
    if (currentIdx >= quotes.length) {
      quotes = shuffle(quotes);
      currentIdx = 0;
    }
  }

  fetch(QUOTES_URL)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var lines = text.trim().split('\n');
      var headers = parseLine(lines[0]).map(function(h) { return h.toLowerCase(); });
      var qIdx = headers.indexOf('quote');
      var sIdx = headers.indexOf('show');
      var cIdx = headers.indexOf('character');

      lines.slice(1).forEach(function(line) {
        var cols = parseLine(line);
        var q = cols[qIdx] || '';
        if (!q) return;
        quotes.push({
          quote:     q,
          show:      sIdx > -1 ? (cols[sIdx] || '') : '',
          character: cIdx > -1 ? (cols[cIdx] || '') : ''
        });
      });

      if (quotes.length) {
        quotes = shuffle(quotes);
        showQuote();
        setInterval(showQuote, 15000);
      }
    })
    .catch(function() { document.getElementById('quote-bar').style.display = 'none'; });
})();

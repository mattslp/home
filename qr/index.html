<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator | Street Lamp</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <meta property="og:description" content="Street Lamp QR Code Generator" />
  <style>
    @import url('https://use.typekit.net/wby1ytb.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #ffffff;
      color: #020202;
      font-family: 'komet', 'Jost', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      padding: 40px 20px;
    }
    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 64px;
      height: auto;
      opacity: 0.8;
    }
    h1 {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(2,2,2,0.4);
    }
    textarea {
      width: 300px;
      padding: 16px 20px;
      background: rgba(2,2,2,0.04);
      border: 1px solid rgba(2,2,2,0.15);
      border-radius: 0;
      color: #020202;
      font-family: 'komet', 'Jost', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      line-height: 1.6;
      resize: none;
      outline: none;
      field-sizing: content;
      min-height: 56px;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: rgba(2,2,2,0.25); }
    textarea:focus { border-color: rgba(2,2,2,0.4); }
    .preview-wrap {
      width: 280px;
      height: 280px;
      display: none;
      background: #ffffff;
      padding: 16px;
    }
    .preview-wrap.show { display: block; }
    .preview {
      width: 100%;
      height: 100%;
      display: block;
    }
    p {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(2,2,2,0.25);
      text-transform: uppercase;
    }
    a { color: inherit; }
  </style>
</head>
<body>
  <div class="app">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500" aria-label="Street Lamp">
      <path fill="#020202" opacity="0.35" d="M1315.82,76.28v956.28h-259.08c0,-242.15,93.17,-430.39,133.23,-500.08l42.65,-74.2l-73.14,-44.44c-34.42,-20.91,-102.39,-64.17,-170.86,-118.9c-79.61,-63.61,-133.93,-121.71,-161.49,-172.68l-24.86,-45.99h513.55Z"/>
      <path fill="#020202" opacity="0.35" d="M184.18,1032.56h259.08c0,-242.17,-93.17,-430.39,-133.23,-500.07l-42.65,-74.2l73.14,-44.44c34.42,-20.91,102.39,-64.17,170.85,-118.89c79.61,-63.62,133.94,-121.72,161.5,-172.69l24.86,-45.98H184.18v956.28Z"/>
      <path fill="#020202" d="M793.98,1032.56h175.08c0-265.62,104.07-472.75,144.89-543.77-36.94-22.44-108.08-67.8-180.07-125.33-89.22-71.3-150.67-138.03-183.89-199.48-33.22,61.45-94.66,128.18-183.89,199.48-71.99,57.54-143.13,102.89-180.07,125.33,40.82,71.02,144.89,278.15,144.89,543.77h175.22v87.69H184.18v87.69h1131.65v-87.69h-521.85v-87.69ZM793.98,487.29l228.52,51.56c-40.21,86.81-94.02,231.4-108.22,406.03h-120.3v-457.58ZM585.72,944.88c-14.2-174.63-68.01-319.22-108.22-406.03l228.78-51.62-.13,457.64h-120.43Z"/>
    </svg>
    <h1>QR Code Generator</h1>
    <textarea oninput="newInput()" placeholder="Paste a URL or start typing…" rows="1"></textarea>
    <div class="preview-wrap">
      <img class="preview" alt="Generating..." />
    </div>
  </div>
  <script>
    function newInput() {
      const value = document.querySelector('textarea').value.trim();
      const wrap = document.querySelector('.preview-wrap');
      const preview = document.querySelector('.preview');
      if (!value) {
        preview.src = '';
        wrap.classList.remove('show');
        return;
      }
      preview.src = `https://api.qrserver.com/v1/create-qr-code/?format=svg&size=248x248&data=${encodeURIComponent(value)}`;
      wrap.classList.add('show');
    }
  </script>
</body>
</html>

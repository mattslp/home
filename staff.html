<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://use.typekit.net/wby1ytb.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://use.typekit.net/wby1ytb.css">
<title>Meet Our Staff | Street Lamp</title>
<style>
  body {
    animation: fadeInAnimation ease 2s;
    animation-iteration-count: 1;
    animation-fill-mode: forwards;
}

@keyframes fadeInAnimation {
    0% {
        opacity: 0;
    }
    100% {
        opacity: 1;
    }
}

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #020202;
    --text:      #f5f0e8;
    --text-dim:  rgba(245,240,232,0.5);
    --text-faint:rgba(245,240,232,0.28);
    --card-bg:   #0d0d0d;
    --card-border:rgba(245,240,232,0.1);
    --accent-rs: #cc3399;
    --accent-ks: #00aa99;
    --font:      'komet', 'Jost', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Page wrapper ── */
  #staff-page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  /* ── Header ── */
  #staff-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }

  #staff-logo {
    width: clamp(160px, 22vw, 260px);
    margin-bottom: 16px;
    cursor: pointer;
    opacity: 0.92;
    transition: opacity 0.2s;
  }
  #staff-logo:hover { opacity: 1; }

  #staff-title {
    font-weight: 700;
    font-size: clamp(1rem, 2.4vw, 1.4rem);
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── Loading / error states ── */
  #staff-status {
    text-align: center;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  #staff-status:not(:empty) {
    padding: 60px 0;
  }

  .staff-skeleton {
    background: linear-gradient(
      90deg,
      rgba(245,240,232,0.03) 0%,
      rgba(245,240,232,0.07) 50%,
      rgba(245,240,232,0.03) 100%
    );
    background-size: 200% 100%;
    animation: shimmer 1.6s ease-in-out infinite;
    border-radius: 2px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Grid ── */
  #staff-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }

  /* ── Card scaffold (flip container) ── */
  .staff-card {
    position: relative;
    cursor: pointer;
    aspect-ratio: 2 / 3;
    outline: none;
  }

  /* The card inner — no 3D, just a positioning context */
  .staff-card-inner {
    position: absolute;
    inset: 0;
    border-radius: 2px;
  }

  /* Shared face styles */
  .staff-face {
    position: absolute;
    inset: 0;
    border-radius: 2px;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  /* Front visible by default — on top via z-index */
  .staff-front {
    opacity: 1;
    transform: scale(1);
    z-index: 2;
  }

  /* Back hidden by default — underneath */
  .staff-back-face {
    opacity: 0;
    transform: scale(0.97);
    pointer-events: none;
    z-index: 1;
  }

  /* Flipped state — back comes on top */
  .staff-card.flipped .staff-front {
    opacity: 0;
    transform: scale(0.97);
    pointer-events: none;
    z-index: 1;
  }

  .staff-card.flipped .staff-back-face {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
    z-index: 2;
  }

  /* ── Front face ── */
  .staff-front {
    display: flex;
    flex-direction: column;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    overflow: hidden;
  }

  .staff-photo-wrap {
    position: relative;
    flex: 1 1 0;
    overflow: hidden;
    min-height: 0;
  }

  .staff-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
    transition: transform 0.4s ease;
    filter: grayscale(100%);
  }

  /* Hover cue overlay */
  .staff-photo-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 55%,
      rgba(2,2,2,0.55) 100%
    );
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  /* Name / position strip */
  .staff-info {
    padding: 12px 14px 13px;
    border-top: 1px solid var(--card-border);
    flex-shrink: 0;
  }

  .staff-name {
    font-weight: 600;
    font-size: clamp(0.68rem, 1.1vw, 0.8rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .staff-position {
    margin-top: 3px;
    font-weight: 300;
    font-size: clamp(0.55rem, 0.85vw, 0.65rem);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Back face ── */
  .staff-back {
    background: var(--card-bg);
    border: 1px solid rgba(245,240,232,0.18);
    display: flex;
    flex-direction: column;
    padding: 18px 16px 16px;
    overflow: hidden;
  }

  .staff-bio-scroll {
    flex: 1 1 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    min-height: 0;
    /* thin scrollbar */
    scrollbar-width: thin;
    scrollbar-color: rgba(245,240,232,0.2) transparent;
  }
  .staff-bio-scroll::-webkit-scrollbar { width: 3px; }
  .staff-bio-scroll::-webkit-scrollbar-track { background: transparent; }
  .staff-bio-scroll::-webkit-scrollbar-thumb { background: rgba(245,240,232,0.2); border-radius: 2px; }

  .staff-bio-text {
    font-weight: 300;
    font-size: clamp(0.6rem, 0.95vw, 0.72rem);
    line-height: 1.7;
    letter-spacing: 0.04em;
    color: rgba(245,240,232,0.8);
  }

  .staff-bio-text p + p { margin-top: 0.85em; }

  /* Close / flip back cue */
  .staff-back-close {
    margin-top: 10px;
    flex-shrink: 0;
    text-align: center;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding-top: 8px;
    border-top: 1px solid rgba(245,240,232,0.07);
  }

  /* ── Skeleton cards ── */
  .staff-card-skeleton {
    aspect-ratio: 2 / 3;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 2px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .staff-card-skeleton .sk-photo {
    flex: 1;
  }
  .staff-card-skeleton .sk-info {
    padding: 12px 14px 13px;
    border-top: 1px solid var(--card-border);
  }
  .staff-card-skeleton .sk-name {
    height: 11px;
    width: 70%;
    margin-bottom: 7px;
  }
  .staff-card-skeleton .sk-pos {
    height: 9px;
    width: 50%;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    #staff-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
    #staff-page { padding: 48px 24px 64px; }
  }
  @media (max-width: 620px) {
    #staff-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    #staff-page { padding: 36px 16px 56px; }
  }

  /* Hover effects only on devices that actually have hover (not touch) */
  @media (hover: hover) {
    .staff-card:hover .staff-photo { transform: scale(1.04); }
    .staff-card:hover .staff-photo-wrap::after { opacity: 1; }
  }
</style>

<script>
(function() {
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0tCEKCsvAN0vdjSwhc8BWE52sbWjqb3gTdYU5m2w-YcazUKvZh0GGuMaHNc-w-RE6u_yGxJ82zUPy/pub?gid=1840359733&single=true&output=csv';

  const grid   = document.getElementById('staff-grid');
  const status = document.getElementById('staff-status');

  // ── CSV parser ──────────────────────────────────────────────
  function driveImgUrl(raw) {
    if (!raw) return '';
    var m = raw.match(/\/file\/d\/([^\/\?&]+)/) || raw.match(/[?&]id=([^&]+)/);
    return m ? 'https://lh3.googleusercontent.com/d/' + m[1] : raw;
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const header = parseLine(lines[0]).map(function(h) { return h.toLowerCase().trim(); });
    const results = [];
    for (var i = 1; i < lines.length; i++) {
      const cols = parseLine(lines[i]);
      var obj = {};
      header.forEach(function(key, idx) { obj[key] = (cols[idx] || '').trim(); });
      if (obj.name) results.push(obj);
    }
    return results;
  }

  function parseLine(line) {
    var cols = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        cols.push(cur);
        cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur);
    return cols;
  }

  // ── Bio formatter (|| = paragraph break) ────────────────────
  function formatBio(raw) {
    if (!raw) return '<p>No bio available.</p>';
    return raw.split('||').map(function(p) {
      return '<p>' + p.trim().replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p>';
    }).join('');
  }

  // ── Skeleton grid ────────────────────────────────────────────
  function showSkeletons(n) {
    grid.innerHTML = '';
    for (var i = 0; i < n; i++) {
      grid.innerHTML +=
        '<div class="staff-card-skeleton">' +
          '<div class="sk-photo staff-skeleton"></div>' +
          '<div class="sk-info">' +
            '<div class="sk-name staff-skeleton"></div>' +
            '<div class="sk-pos staff-skeleton"></div>' +
          '</div>' +
        '</div>';
    }
  }

  // ── Build a single card ──────────────────────────────────────
  function buildCard(person, index) {
    var card = document.createElement('div');
    card.className = 'staff-card';
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', 'Read bio for ' + person.name);

    var rawImg   = person.image_url || '';
    var imgSrc   = driveImgUrl(rawImg);
    var nameSafe = person.name.replace(/</g,'&lt;');
    var posSafe  = (person.position || '').replace(/</g,'&lt;');
    var bioHtml  = formatBio(person.bio);

    // Staggered fade-in
    card.style.opacity = '0';
    card.style.transform = 'translateY(16px)';
    card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';

    card.innerHTML =
      '<div class="staff-card-inner">' +
        '<div class="staff-face staff-back staff-back-face">' +
          '<div class="staff-bio-scroll">' +
            '<div class="staff-bio-text">' + bioHtml + '</div>' +
          '</div>' +
          '<div class="staff-back-close">Click to close</div>' +
        '</div>' +
        '<div class="staff-face staff-front">' +
          '<div class="staff-photo-wrap">' +
            (imgSrc
              ? '<img class="staff-photo" src="' + imgSrc + '" alt="' + nameSafe + '" loading="lazy">'
              : '<div class="staff-photo" style="background:rgba(245,240,232,0.04);display:flex;align-items:center;justify-content:center;">'
                + '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(245,240,232,0.15)" stroke-width="1">'
                + '<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>')
            +
          '</div>' +
          '<div class="staff-info">' +
            '<div class="staff-name">' + nameSafe + '</div>' +
            '<div class="staff-position">' + posSafe + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Flip toggle — ignore if user is scrolling the bio
    function toggle(e) {
      if (e.target && e.target.closest('.staff-bio-scroll')) return;
      card.classList.toggle('flipped');
      if (!card.classList.contains('flipped')) {
        var scroll = card.querySelector('.staff-bio-scroll');
        if (scroll) scroll.scrollTop = 0;
      }
    }

    // Fully passive touch handling — never blocks scroll under any circumstances.
    var touchStartY = 0;
    var touchStartX = 0;
    var lastTouchEnd = 0;

    card.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    card.addEventListener('touchend', function(e) {
      var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
      var dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
      if (dy > 10 || dx > 10) return;
      lastTouchEnd = Date.now();
      toggle(e);
    }, { passive: true });

    // Mouse only — skip if a touch just fired (within 500ms)
    card.addEventListener('click', function(e) {
      if (Date.now() - lastTouchEnd < 500) return;
      toggle(e);
    });

    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(e); }
    });

    return card;
  }

  // ── Render ───────────────────────────────────────────────────
  function render(people) {
    grid.innerHTML = '';
    if (!people.length) {
      status.textContent = 'No staff found.';
      return;
    }
    status.textContent = '';
    people.forEach(function(person, idx) {
      var card = buildCard(person, idx);
      grid.appendChild(card);
      // Staggered reveal
      setTimeout(function() {
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, 60 + idx * 55);
    });
  }

  // ── Load ─────────────────────────────────────────────────────
  showSkeletons(8);
  fetch(CSV_URL)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      var people = parseCSV(text);
      // Split into fixed-order and shuffled groups
      var fixed = [], rest = [];
      people.forEach(function(p) {
        var o = parseInt(p.order, 10);
        if (!isNaN(o) && o > 0) fixed.push(p);
        else rest.push(p);
      });
      // Sort fixed by their order number
      fixed.sort(function(a, b) { return parseInt(a.order,10) - parseInt(b.order,10); });
      // Shuffle the rest
      for (var i = rest.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = rest[i]; rest[i] = rest[j]; rest[j] = t;
      }
      render(fixed.concat(rest));
    })
    .catch(function(err) {
      console.warn('Street Lamp staff: fetch error', err);
      grid.innerHTML = '';
      status.textContent = 'Unable to load staff — please try again later.';
    });
})();
</script>
<div id="footer-placeholder"></div>
<script>
  fetch('/footer.html')
    .then(function(r) { return r.text(); })
    .then(function(html) {
      document.getElementById('footer-placeholder').innerHTML = html;
    });
</script>

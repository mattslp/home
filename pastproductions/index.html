<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://use.typekit.net/wby1ytb.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
<title>Past Productions | Street Lamp</title>
<style>
  @import url('https://use.typekit.net/wby1ytb.css');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #020202;
    --text:        #f5f0e8;
    --text-dim:    rgba(245,240,232,0.45);
    --text-faint:  rgba(245,240,232,0.22);
    --rule:        rgba(245,240,232,0.1);
    --youth:       #cc3399;
    --community:   #00aa99;
    --font:        'komet', 'Jost', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Page ── */
  #pp-page {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 40px 100px;
  }

  /* ── Header ── */
  #pp-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 72px;
  }

  #pp-logo {
    width: clamp(140px, 20vw, 220px);
    margin-bottom: 20px;
    opacity: 0.92;
    transition: opacity 0.2s;
  }
  #pp-logo:hover { opacity: 1; }

  #pp-title {
    font-weight: 700;
    font-size: clamp(1rem, 2.4vw, 1.4rem);
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── Status ── */
  #pp-status {
    text-align: center;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  #pp-status:not(:empty) { padding: 60px 0; }

  /* ── Year group ── */
  .pp-year-group {
    margin-bottom: 56px;
  }

  .pp-year-group:last-child { margin-bottom: 0; }

  /* Year heading */
  .pp-year-heading {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 20px;
  }

  .pp-year-number {
    font-weight: 700;
    font-size: clamp(2.4rem, 6vw, 4rem);
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
    flex-shrink: 0;
  }

  .pp-year-rule {
    flex: 1;
    height: 1px;
    background: var(--rule);
    margin-bottom: 4px;
  }

  .pp-year-count {
    font-weight: 300;
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
    flex-shrink: 0;
    margin-bottom: 4px;
  }

  /* ── Show rows ── */
  .pp-show {
    display: flex;
    align-items: center;
    gap: 0;
    border-top: 1px solid var(--rule);
    min-height: 72px;
    position: relative;
    overflow: hidden;
  }

  .pp-show:last-child {
    border-bottom: 1px solid var(--rule);
  }

  /* Image — flush right, only present when image_url exists */
  .pp-show-img {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 160px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .pp-show-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    opacity: 0.55;
    transition: opacity 0.3s ease;
  }

  /* Fade the image into the background on the left edge */
  .pp-show-img::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, var(--bg) 0%, transparent 60%);
    z-index: 1;
    pointer-events: none;
  }

  .pp-show:hover .pp-show-img img { opacity: 0.75; }

  /* Text content */
  .pp-show-body {
    flex: 1;
    padding: 16px 0;
    position: relative;
    z-index: 2;
  }

  /* No image — no right padding needed */
  .pp-show.no-image .pp-show-body {
    padding-right: 0;
  }

  .pp-show-name {
    font-weight: 600;
    font-size: clamp(0.9rem, 2.2vw, 1.15rem);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1.2;
  }

  .pp-show-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 5px;
  }

  .pp-show-tag {
    font-weight: 300;
    font-size: 0.55rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── Year nav sidebar ── */
  #pp-year-nav {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  #pp-year-nav.visible { opacity: 1; }

  .pp-nav-year {
    font-family: var(--font);
    font-weight: 600;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    cursor: pointer;
    padding: 2px 0 2px 8px;
    border-right: 1px solid var(--text-faint);
    transition: color 0.2s ease, border-color 0.2s ease;
    user-select: none;
    text-decoration: none;
    display: block;
    line-height: 1.4;
  }

  .pp-nav-year:hover {
    color: var(--text-dim);
    border-color: var(--text-dim);
  }

  .pp-nav-year.active {
    color: var(--text);
    border-color: var(--text);
  }

  /* Hide on narrow screens where it'd overlap content */
  @media (max-width: 1000px) {
    #pp-year-nav { display: none; }
  }

  /* ── Skeleton ── */
  .pp-skeleton-group { margin-bottom: 56px; }

  .pp-skeleton-year {
    height: 56px;
    width: 120px;
    margin-bottom: 20px;
    border-radius: 2px;
  }

  .pp-skeleton-row {
    height: 72px;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
  }

  .pp-skeleton-row:last-child { border-bottom: 1px solid var(--rule); }

  .pp-skeleton-name {
    height: 14px;
    width: 55%;
    border-radius: 2px;
  }

  .pp-skel {
    background: linear-gradient(
      90deg,
      rgba(245,240,232,0.03) 0%,
      rgba(245,240,232,0.08) 50%,
      rgba(245,240,232,0.03) 100%
    );
    background-size: 200% 100%;
    animation: pp-shimmer 1.6s ease-in-out infinite;
  }

  @keyframes pp-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    #pp-page { padding: 40px 20px 80px; }
    #pp-header { margin-bottom: 48px; }
    .pp-show-img { width: 160px; }
    .pp-year-number { font-size: clamp(2rem, 10vw, 3rem); }
  }
</style>
</head>

<script>
(function() {
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0tCEKCsvAN0vdjSwhc8BWE52sbWjqb3gTdYU5m2w-YcazUKvZh0GGuMaHNc-w-RE6u_yGxJ82zUPy/pub?gid=1781121514&single=true&output=csv';

  const archive = document.getElementById('pp-archive');
  const status  = document.getElementById('pp-status');
  const yearNav = document.getElementById('pp-year-nav');

  // ── CSV parser ──────────────────────────────────────────────
  function parseLine(line) {
    var cols = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur);
    return cols;
  }

  function parseCSV(text) {
    var lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    var header = parseLine(lines[0]).map(function(h) { return h.toLowerCase().trim(); });
    var results = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = parseLine(lines[i]);
      var obj = {};
      header.forEach(function(key, idx) { obj[key] = (cols[idx] || '').trim(); });
      if (obj.show_name) results.push(obj);
    }
    return results;
  }

  // ── Group by year, sort ascending ──────────────────────────
  function groupByYear(shows) {
    var map = {};
    shows.forEach(function(s) {
      var y = s.year || 'Unknown';
      if (!map[y]) map[y] = [];
      map[y].push(s);
    });
    // Sort years ascending
    var years = Object.keys(map).sort(function(a, b) {
      return parseInt(a) - parseInt(b);
    });
    return years.map(function(y) {
      map[y].sort(function(a, b) {
        return a.show_name.localeCompare(b.show_name);
      });
      return { year: y, shows: map[y] };
    });
  }

  // ── Skeleton ────────────────────────────────────────────────
  function showSkeleton() {
    var html = '';
    [3, 2, 4].forEach(function(count) {
      html += '<div class="pp-skeleton-group">';
      html += '<div class="pp-skeleton-year pp-skel"></div>';
      for (var i = 0; i < count; i++) {
        html += '<div class="pp-skeleton-row">';
        html += '<div class="pp-skeleton-name pp-skel"></div>';
        html += '</div>';
      }
      html += '</div>';
    });
    archive.innerHTML = html;
  }

  // ── Render a company tag ────────────────────────────────────
  function companyTag(raw) {
    if (!raw || !raw.trim()) return '';
    return '<span class="pp-show-tag">' + raw.trim().replace(/</g, '&lt;') + '</span>';
  }

  // ── Convert any Google Drive share link to a displayable URL ──
  function driveImgUrl(raw) {
    if (!raw) return '';
    var url = raw.trim();
    // Already a direct lh3 or other direct URL — use as-is
    if (!url.includes('drive.google.com')) return url;
    // Extract file ID from formats:
    //   /file/d/FILE_ID/view
    //   id=FILE_ID
    //   open?id=FILE_ID
    var m = url.match(/\/file\/d\/([^\/\?&]+)/)
         || url.match(/[?&]id=([^&]+)/);
    if (!m) return url; // unrecognised format, try as-is
    return 'https://lh3.googleusercontent.com/d/' + m[1];
  }

  // ── Render ──────────────────────────────────────────────────
  function render(shows) {
    if (!shows.length) {
      status.textContent = 'No productions found.';
      archive.innerHTML = '';
      return;
    }

    var groups = groupByYear(shows);
    archive.innerHTML = '';
    status.textContent = '';

    groups.forEach(function(group, gi) {
      var div = document.createElement('div');
      div.className = 'pp-year-group';

      // Staggered fade-in per group
      div.style.opacity = '0';
      div.style.transform = 'translateY(12px)';
      div.style.transition = 'opacity 0.4s ease, transform 0.4s ease';

      var showCount = group.shows.length;
      var countLabel = showCount + ' production' + (showCount === 1 ? '' : 's');

      var html = '<div class="pp-year-heading">'
               + '<span class="pp-year-number">' + group.year + '</span>'
               + '<span class="pp-year-rule"></span>'
               + '<span class="pp-year-count">' + countLabel + '</span>'
               + '</div>';

      group.shows.forEach(function(show) {
        var hasImg = show.image_url && show.image_url.trim();
        var imgSrc = hasImg ? driveImgUrl(show.image_url) : '';
        var nameSafe = (show.show_name || '').replace(/</g, '&lt;');
        var tag = companyTag(show.company || '');

        html += '<div class="pp-show' + (hasImg ? '' : ' no-image') + '">';
        html += '<div class="pp-show-body">';
        html += '<div class="pp-show-name">' + nameSafe + '</div>';
        if (tag) {
          html += '<div class="pp-show-meta">' + tag + '</div>';
        }
        html += '</div>';

        if (hasImg) {
          html += '<div class="pp-show-img">'
               +  '<img src="' + imgSrc + '" alt="' + nameSafe + '" loading="lazy">'
               +  '</div>';
        }

        html += '</div>';
      });

      div.innerHTML = html;
      div.setAttribute('data-year', group.year);

      // Start hidden for scroll reveal
      div.style.opacity = '0';
      div.style.transform = 'translateY(20px)';
      div.style.transition = 'opacity 0.5s ease, transform 0.5s ease';

      // Also hide individual show rows for staggered wipe
      archive.appendChild(div);
    });

    // ── Build year nav ────────────────────────────────────────
    yearNav.innerHTML = '';
    groups.forEach(function(group) {
      var a = document.createElement('a');
      a.className = 'pp-nav-year';
      a.textContent = group.year;
      a.href = '#year-' + group.year;
      // Smooth scroll to year group
      a.addEventListener('click', function(e) {
        e.preventDefault();
        var target = archive.querySelector('[data-year="' + group.year + '"]');
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      yearNav.appendChild(a);
    });
    yearNav.classList.add('visible');

    // ── IntersectionObserver 1 — scroll reveal wipe ───────────
    var yearGroups = archive.querySelectorAll('.pp-year-group');

    if ('IntersectionObserver' in window) {
      var revealObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          var group = entry.target;

          // Reveal the year group
          group.style.opacity = '1';
          group.style.transform = 'translateY(0)';

          // Stagger individual show rows within the group
          var rows = group.querySelectorAll('.pp-show');
          rows.forEach(function(row, i) {
            row.style.opacity = '0';
            row.style.transform = 'translateY(10px)';
            row.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
            setTimeout(function() {
              row.style.opacity = '1';
              row.style.transform = 'translateY(0)';
            }, 100 + i * 60);
          });

          revealObserver.unobserve(group);
        });
      }, { rootMargin: '0px 0px -8% 0px', threshold: 0.05 });

      yearGroups.forEach(function(g) { revealObserver.observe(g); });

      // ── IntersectionObserver 2 — nav highlight ────────────────
      var navLinks = yearNav.querySelectorAll('.pp-nav-year');

      var navObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var activeYear = entry.target.getAttribute('data-year');
            navLinks.forEach(function(link) {
              link.classList.toggle('active', link.textContent === activeYear);
            });
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });

      yearGroups.forEach(function(g) { navObserver.observe(g); });
    }
  }

  // ── Load ────────────────────────────────────────────────────
  showSkeleton();
  fetch(CSV_URL)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) { render(parseCSV(text)); })
    .catch(function(err) {
      console.warn('Street Lamp productions: fetch error', err);
      archive.innerHTML = '';
      status.textContent = 'Unable to load productions — please try again later.';
    });
})();
</script>
<div id="footer-placeholder"></div>
<script>
  fetch('/footer.html')
    .then(function(r) { return r.text(); })
    .then(function(html) {
      document.getElementById('footer-placeholder').innerHTML = html;
    });
</script>

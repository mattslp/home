<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summer Camps | Street Lamp</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="stylesheet" href="https://use.typekit.net/wby1ytb.css">
</head>
<body>
<style>
  body * {
      font-family: inherit;
    }
  body {
    animation: fadeInAnimation ease 2s;
    animation-iteration-count: 1;
    animation-fill-mode: forwards;
}

@keyframes fadeInAnimation {
    0% {
        opacity: 0;
    }
    100% {
        opacity: 1;
    }
}

  #sl-camps * { box-sizing: border-box; padding: 0; }

  #sl-camps {
    background: #020202;
    color: #f5f0e8;
    font-family: 'komet', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Banner ── */
  #sl-camps-banner {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 24px 44px;
    text-align: center;
  }

  @media (max-width: 768px) {
    #sl-camps-banner { padding: 16px 24px 12px; }
  }

  #sl-camps-logo {
    width: clamp(60px, 10vw, 120px);
    height: auto;
    margin-bottom: 30px;
  }

  #sl-camps-logo path, #sl-camps-logo g path { fill: #f5f0e8; }

  #sl-camps-banner a {
    text-decoration: none;
    display: block;
    cursor: pointer;
  }

  #sl-camps-title {
    font-weight: 900;
    font-size: clamp(1.375rem, 4.69vw, 3.25rem);
    line-height: 1;
    letter-spacing: -0.06em;
    text-transform: uppercase;
    color: #f5f0e8;
    margin-bottom: 0;
  }

  /* ── Section ── */
  .sl-camps-section {
    padding: 30px 50px 30px !important;
  }

  @media (max-width: 560px) {
    .sl-camps-section { padding: 30px 24px !important; }
  }

  .sl-section-heading {
    font-weight: 900;
    font-size: clamp(1.1rem, 3.75vw, 2.6rem);
    line-height: 1;
    letter-spacing: -0.06em;
    text-transform: uppercase;
    color: #f5f0e8;
    margin-bottom: 32px !important;
    padding-top: 60px !important;
    white-space: nowrap;
    overflow: hidden;
  }

  /* ── Camp cards ── */
  .sl-camp-card {
    display: block;
    width: 100%;
    border: none;
    border-left: 3px solid transparent;
    padding-left: 20px !important;
    margin-bottom: 20px !important;
    text-decoration: none;
    color: #f5f0e8;
    cursor: pointer;
    background: #020202 !important;
    box-sizing: border-box;
    transition: background 0.2s, border-left-color 0.2s;
    overflow: hidden;
  }

  .sl-camp-card:hover {
    background: rgba(245,240,232,0.03) !important;
  }

  .sl-camp-card.venue-rising-sun  { border-left-color: #cc3399; }
  .sl-camp-card.venue-rising-sun:hover { border-left-color: #ff44bb; }
  .sl-camp-card.venue-kennett     { border-left-color: #00aa99; }
  .sl-camp-card.venue-kennett:hover  { border-left-color: #00ddcc; }

  /* Card layout — image left, info right */
  .sl-camp-card-inner {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .sl-camp-img-wrap {
    width: 30%;
    max-width: 30%;
    flex-shrink: 0;
    padding: 16px 28px 16px 20px;
    box-sizing: border-box;
  }

  .sl-camp-img {
    width: auto;
    max-width: 100%;
    height: auto;
    max-height: 280px;
    object-fit: contain;
    object-position: left top;
    display: block;
  }

  /* Text area */
  .sl-camp-info {
    flex: 1;
    padding: 20px 24px 20px 20px;
    min-width: 0;
  }

  @media (max-width: 768px) {
    .sl-camp-card-inner { flex-direction: column; gap: 0; }
    .sl-camp-img-wrap { width: 100%; max-width: 100%; padding: 16px 20px 8px; }
    .sl-camp-info { padding: 8px 20px 20px 20px !important; }
  }

  .sl-camp-name {
    font-weight: 400;
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    letter-spacing: 0.03em;
    color: #f5f0e8;
    margin-bottom: 6px;
  }

  .sl-camp-meta {
    display: block;
    font-size: clamp(0.72rem, 1.8vw, 0.7rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #f5f0e8;
    margin-bottom: 8px;
  }

  .sl-camp-register {
    display: block;
    font-family: 'komet', 'Jost', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2vw, 0.88rem);
    line-height: 1.75;
    color: rgba(245,240,232,0.55);
    text-decoration: underline;
    text-underline-offset: 3px;
    margin-top: 1.75em;
    transition: color 0.2s;
  }

  .sl-camp-register:hover { color: #f5f0e8; }

  .sl-camp-desc {
    font-size: clamp(0.9rem, 2vw, 0.88rem);
    line-height: 1.75;
    color: rgba(245,240,232,0.55);
  }

  /* ── Tabs ── */
  #sl-tabs {
    display: flex;
    gap: 2px;
    padding: 32px 0 0;
    margin-bottom: 0;
  }



  .sl-tab {
    flex: 1;
    font-family: 'komet', 'Jost', sans-serif;
    font-weight: 900;
    font-size: clamp(1rem, 3vw, 2rem);
    line-height: 1;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(245,240,232,0.08);
    padding: 0.75em 20px !important;
    min-height: 64px !important;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    text-align: center;
  }

  .sl-tab:hover {
    color: rgba(245,240,232,0.6);
    background: linear-gradient(to bottom, transparent 0%, rgba(245,240,232,0.06) 100%);
  }

  .sl-tab.active {
    color: #f5f0e8;
    border-bottom: 2px solid rgba(245,240,232,0.5);
  }

  .sl-tab.active.venue-rising-sun {
    border-bottom-color: #cc3399;
    background: linear-gradient(to bottom, transparent 0%, rgba(204,51,153,0.12) 100%);
  }

  .sl-tab.active.venue-kennett {
    border-bottom-color: #00aa99;
    background: linear-gradient(to bottom, transparent 0%, rgba(0,170,153,0.12) 100%);
  }

  .sl-tab:hover.venue-rising-sun {
    background: linear-gradient(to bottom, transparent 0%, rgba(204,51,153,0.07) 100%);
  }

  .sl-tab:hover.venue-kennett {
    background: linear-gradient(to bottom, transparent 0%, rgba(0,170,153,0.07) 100%);
  }

  .sl-tab-panel {
    display: none;
  }

  .sl-tab-panel.active {
    display: block;
    padding-top: 30px !important;
  }



  /* ── Sold out overlay ── */
  .sl-camp-card {
    position: relative;
  }

  .sl-sold-out {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(2,2,2,0.72);
    pointer-events: none;
    z-index: 2;
  }

  .sl-sold-out-label {
    font-family: 'komet', 'Jost', sans-serif;
    font-weight: 900;
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.85);
    border: 2px solid rgba(245,240,232,0.4);
    padding: 6px 20px;
    transform: rotate(-8deg);
  }

  .sl-camp-card.sold-out {
    pointer-events: none;
    filter: grayscale(40%);
  }

  /* ── Empty / loading ── */
  .sl-empty {
    font-size: clamp(0.9rem, 2vw, 0.88rem);
    color: rgba(245,240,232,0.3);
    letter-spacing: 0.1em;
    padding: 20px 0 40px;
  }

  .sl-spinner {
    width: 20px;
    height: 20px;
    border: 1px solid rgba(245,240,232,0.15);
    border-top-color: rgba(245,240,232,0.5);
    border-radius: 50%;
    animation: sl-spin 0.8s linear infinite;
    margin: 40px 0;
  }

  @keyframes sl-spin { to { transform: rotate(360deg); } }

  @media (max-width: 560px) {
    .sl-camps-section { padding: 0 24px 60px !important; }
    .sl-section-heading { font-size: clamp(1.1rem, 5vw, 2.6rem); }
  }

  /* Squarespace overrides */
  body, html { margin: 0 !important; padding: 0 !important; background: #020202 !important; }
  body { background-color: #020202 !important; }
  .sqs-layout .sqs-row .sqs-block,
  .sqs-block-content, .sqs-block-code,
  .content-wrapper, .content-inner,
  article.entry-detail, .entry-content,
  .page-section, [data-section-id],
  .fluid-engine, [data-fluid-engine-block] { padding: 0 !important; margin: 0 !important; }

  @media (max-width: 768px) {
    .sl-camp-name, .sl-event-name, .sl-aud-name { font-size: 1.05rem !important; }
    .sl-camp-meta, .sl-event-meta, .sl-aud-meta { font-size: 0.82rem !important; }
    .sl-camp-desc, .sl-aud-desc { font-size: 0.95rem !important; line-height: 1.7; }
  }
</style>

<script>
(function() {
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0tCEKCsvAN0vdjSwhc8BWE52sbWjqb3gTdYU5m2w-YcazUKvZh0GGuMaHNc-w-RE6u_yGxJ82zUPy/pub?gid=778912244&single=true&output=csv';

  const MONTHS = {
    january:0, february:1, march:2, april:3, may:4, june:5,
    july:6, august:7, september:8, october:9, november:10, december:11,
    jan:0, feb:1, mar:2, apr:3, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11
  };

  function parseDateKey(dates) {
    if (!dates) return Infinity;
    const parts = dates.trim().toLowerCase().split(/\s+/);
    const month = MONTHS[parts[0]];
    const day   = parseInt(parts[1]) || 1;
    if (month === undefined) return Infinity;
    return month * 100 + day;
  }

  function sortByDate(rows) {
    return rows.slice().sort(function(a, b) {
      return parseDateKey(a.dates) - parseDateKey(b.dates);
    });
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n').filter(l => l.trim());
    const cols  = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim().toLowerCase());
    return lines.slice(1).map(function(line) {
      const vals = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      vals.push(cur.trim());
      const row = {};
      cols.forEach((c, i) => { row[c] = (vals[i] || '').replace(/^"|"$/g, '').trim(); });
      return row;
    }).filter(r => Object.values(r).some(v => v));
  }

  function venueClass(label) {
    const l = (label || '').toLowerCase();
    if (l.includes('rising')) return 'venue-rising-sun';
    if (l.includes('kennett')) return 'venue-kennett';
    return '';
  }

  function renderCard(row) {
    const vc   = venueClass(row.label);
    const dateStr = row.dates || '';
    const agesStr = row.ages ? '<span class="sl-camp-ages">Ages ' + row.ages + '</span>' : '';
    const metaParts = [dateStr, agesStr].filter(Boolean).join(' · ');

    const isSoldOut = (row.soldout || '').toLowerCase() === 'yes';
    const imgWrap = row.image_url
      ? `<div class="sl-camp-img-wrap"><img class="sl-camp-img" src="${row.image_url}" alt="${row.name}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
      : '';
    return `<div class="sl-camp-card ${vc}${isSoldOut ? ' sold-out' : ''}" ${row.url && !isSoldOut ? `onclick="window.open('${row.url}','_blank')"` : ''}>
      ${isSoldOut ? '<div class="sl-sold-out"><span class="sl-sold-out-label">Sold Out</span></div>' : ''}
      <div class="sl-camp-card-inner">
        ${imgWrap}
        <div class="sl-camp-info">
          <p class="sl-camp-name">${row.name}</p>
          ${(dateStr || agesStr) ? `<span class="sl-camp-meta">${metaParts}</span>` : ''}
          ${row.description ? row.description.split('||').map((p, i) => `<p class="sl-camp-desc" style="${i>0?'margin-top:1.2em':''}">` + p.trim() + '</p>').join('') : ''}

        ${row.url && !isSoldOut ? `<a href="${row.url}" target="_blank" rel="noopener" class="sl-camp-register" onclick="event.stopPropagation()">Click here to register</a>` : ''}
        </div>
      </div>
    </div>`;
  }

  async function load() {
    try {
      const res  = await fetch(CSV_URL);
      const text = await res.text();
      const rows = parseCSV(text);

      // Check if any camps are active
      const activeRows = rows.filter(r => !r.active || r.active.toLowerCase() !== 'no');

      if (!activeRows.length) {
        // All inactive — hide tabs, show message
        document.getElementById('sl-tabs').style.display = 'none';
        document.querySelectorAll('.sl-camps-section').forEach(function(el) { el.style.display = 'none'; });
        var msg = document.createElement('p');
        msg.className = 'sl-empty';
        msg.style.cssText = 'text-align:center;padding:80px 40px;';
        msg.textContent = 'No summer camps are currently available — check back soon.';
        document.getElementById('sl-camps').appendChild(msg);
        return;
      }

      const rising  = sortByDate(activeRows.filter(r => (r.label || '').toLowerCase().includes('rising')));
      const kennett = sortByDate(activeRows.filter(r => (r.label || '').toLowerCase().includes('kennett')));

      const risingList  = document.getElementById('sl-rising-list');
      const kennettList = document.getElementById('sl-kennett-list');

      risingList.innerHTML  = rising.length  ? rising.map(renderCard).join('')  : '<p class="sl-empty">No camps currently available — check back soon.</p>';
      kennettList.innerHTML = kennett.length ? kennett.map(renderCard).join('') : '<p class="sl-empty">No camps currently available — check back soon.</p>';

    } catch(e) {
      console.warn('Street Lamp: camps load error', e);
      document.getElementById('sl-rising-list').innerHTML  = '<p class="sl-empty">Unable to load camps.</p>';
      document.getElementById('sl-kennett-list').innerHTML = '<p class="sl-empty">Unable to load camps.</p>';
    }
  }

  load();

  // URL hash deep links: #rs = Rising Sun, #ksq = Kennett Square
  (function() {
    function handleHash() {
      var hash = window.location.hash.toLowerCase().replace('#', '').trim();
      if (hash === 'ksq' || hash === 'kennett') {
        window.switchTab('kennett');
      } else if (hash === 'rs' || hash === 'rising') {
        window.switchTab('rising');
      }
    }
    // Small delay to ensure DOM is ready
    setTimeout(handleHash, 100);
    window.addEventListener('hashchange', handleHash);
  })();

  window.switchTab = function(id) {
    document.querySelectorAll('.sl-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.sl-tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelector('.sl-tab[onclick*="' + id + '"]').classList.add('active');
    document.getElementById('sl-' + id + '-panel').classList.add('active');
  };
})();
</script>
<div id="footer-placeholder"></div>
<script>
  fetch('/footer.html')
    .then(function(r) { return r.text(); })
    .then(function(html) {
      document.getElementById('footer-placeholder').innerHTML = html;
    });
</script>

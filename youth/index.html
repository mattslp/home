<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performing Arts Academy | Street Lamp</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="stylesheet" href="https://use.typekit.net/wby1ytb.css">
  <style>
    body {
    animation: fadeInAnimation ease 2s;
    animation-iteration-count: 1;
    animation-fill-mode: forwards;
}

@keyframes fadeInAnimation {
    0% {
        opacity: 0;
    }
    100% {
        opacity: 1;
    }
}
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#020202; --text:#f5f0e8; --text-dim:rgba(245,240,232,0.5); --youth:#cc3399; --kennett:#00aa99; --font:'komet','Jost',sans-serif; }
    html, body {
      background:var(--bg);
      color:var(--text);
      font-family:var(--font);
      -webkit-font-smoothing:antialiased; 
      display:flex; 
      flex-direction:column; 
      align-items:stretch; 
      min-height:100vh; }
    body * {
      font-family: inherit;
    }
    #yp-main { 
      flex:none; 
      min-height:100vh; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      justify-content:center; 
      padding:40px 24px; 
      gap:48px; 
    }
    #yp-header { 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      gap:20px; 
      text-align:center; 
      opacity:0; 
      transform:translateY(16px); 
      animation:fadeUp 0.6s ease 0.1s forwards; 
    }
    #yp-logo { width:clamp(56px,10vw,80px); opacity:0.7; transition:opacity 0.2s; }
    #yp-logo:hover { opacity:1; }
    #yp-title { font-size:clamp(1.8rem,5vw,3rem); font-weight:900; letter-spacing:-0.02em; text-transform:uppercase; line-height:1; }
    #yp-prompt { font-size:0.72rem; font-weight:300; letter-spacing:0.2em; color:var(--text-dim); text-transform:uppercase; }
    #yp-cards { display:grid; grid-template-columns:1fr 1fr; gap:20px; width:100%; max-width:680px; opacity:0; transform:translateY(16px); animation:fadeUp 0.6s ease 0.3s forwards; }
    .yp-card { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 40px; border:1px solid rgba(245,240,232,0.1); text-decoration:none; color:var(--text); position:relative; overflow:hidden; transition:border-color 0.25s; cursor:pointer; }
    .yp-card::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.25s; }
    .yp-card.rs::before { background:radial-gradient(ellipse at center,rgba(204,51,153,0.12) 0%,transparent 70%); }
    .yp-card.ksq::before { background:radial-gradient(ellipse at center,rgba(0,170,153,0.12) 0%,transparent 70%); }
    .yp-card:hover::before { opacity:1; }
    .yp-card.rs:hover { border-color:rgba(204,51,153,0.5); }
    .yp-card.ksq:hover { border-color:rgba(0,170,153,0.5); }
    .yp-card-name { font-size:clamp(1.1rem,3vw,1.6rem); font-weight:900; letter-spacing:-0.01em; text-transform:uppercase; text-align:center; position:relative; z-index:1; }
    .yp-card.rs .yp-card-name { color:var(--youth); }
    .yp-card.ksq .yp-card-name { color:var(--kennett); }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    @media (max-width:480px) { #yp-cards { grid-template-columns:1fr; max-width:360px; } .yp-card { padding:16px 32px; } }
    #sl-footer { width:100%; padding:56px 40px 48px; display:flex; flex-direction:column; align-items:center; gap:24px; font-family:'komet','Jost',sans-serif; background:#020202; color:#f5f0e8; -webkit-font-smoothing:antialiased; text-align:center; box-sizing:border-box; }
    #sl-footer * { box-sizing:border-box; }
    #sl-footer a { display:block; margin:0 auto; }
    #sl-footer-logo { width:48px; opacity:0.4; transition:opacity 0.2s; margin:0 auto; }
    #sl-footer-logo:hover { opacity:0.7; }
    #sl-footer-contact { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; }
    .sl-footer-link { font-size:0.78rem; font-weight:400; letter-spacing:0.18em; color:rgba(245,240,232,0.45); text-decoration:none; transition:color 0.2s; text-align:center; width:100%; }
    .sl-footer-link:hover { color:rgba(245,240,232,0.85); }
    #sl-footer-social { display:flex; justify-content:center; gap:24px; align-items:center; }
    .sl-footer-social-link { color:rgba(245,240,232,0.4); transition:color 0.2s ease; display:flex; align-items:center; width:auto; margin:0; }
    .sl-footer-social-link:hover { color:rgba(245,240,232,0.85); }
    .sl-footer-social-link svg { width:20px; height:20px; }
    #sl-footer-rule { width:1px; height:20px; background:rgba(245,240,232,0.12); margin:0 auto; }
    #sl-footer-legal { display:flex; flex-direction:column; align-items:center; gap:6px; width:100%; }
    .sl-footer-legal-text { font-size:0.68rem; font-weight:300; letter-spacing:0.18em; color:rgba(245,240,232,0.45); text-align:center; line-height:1.6; max-width:640px; margin:0 auto; width:100%; }
    @media (max-width:600px) { #sl-footer { padding:48px 24px 40px; } .sl-footer-legal-text { font-size:0.58rem; } }
  </style>
</head>
<body>

<div id="yp-main">
  <header id="yp-header">
    <a href="https://streetlamp.org">
      <svg id="yp-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500" aria-label="Street Lamp">
        <path fill="#f5f0e8" opacity="0.35" d="M1315.82,76.28v956.28h-259.08c0,-242.15,93.17,-430.39,133.23,-500.08l42.65,-74.2l-73.14,-44.44c-34.42,-20.91,-102.39,-64.17,-170.86,-118.9c-79.61,-63.61,-133.93,-121.71,-161.49,-172.68l-24.86,-45.99h513.55Z"/>
        <path fill="#f5f0e8" opacity="0.35" d="M184.18,1032.56h259.08c0,-242.17,-93.17,-430.39,-133.23,-500.07l-42.65,-74.2l73.14,-44.44c34.42,-20.91,102.39,-64.17,170.85,-118.89c79.61,-63.62,133.94,-121.72,161.5,-172.69l24.86,-45.98H184.18v956.28Z"/>
        <path fill="#f5f0e8" d="M793.98,1032.56h175.08c0-265.62,104.07-472.75,144.89-543.77-36.94-22.44-108.08-67.8-180.07-125.33-89.22-71.3-150.67-138.03-183.89-199.48-33.22,61.45-94.66,128.18-183.89,199.48-71.99,57.54-143.13,102.89-180.07,125.33,40.82,71.02,144.89,278.15,144.89,543.77h175.22v87.69H184.18v87.69h1131.65v-87.69h-521.85v-87.69ZM793.98,487.29l228.52,51.56c-40.21,86.81-94.02,231.4-108.22,406.03h-120.3v-457.58ZM585.72,944.88c-14.2-174.63-68.01-319.22-108.22-406.03l228.78-51.62-.13,457.64h-120.43Z"/>
      </svg>
    </a>
    <h1 id="yp-title">Performing Arts Academy</h1>
    <p id="yp-prompt">Choose your location</p>
  </header>

  <div id="yp-cards">
    <a class="yp-card rs" href="program.html?loc=rs">
      <span class="yp-card-name">Rising Sun</span>
    </a>
    <a class="yp-card ksq" href="program.html?loc=ksq">
      <span class="yp-card-name">Kennett Square</span>
    </a>
  </div>
</div>
<div id="footer-placeholder"></div>
<script>
  fetch('/footer.html')
    .then(function(r) { return r.text(); })
    .then(function(html) {
      document.getElementById('footer-placeholder').innerHTML = html;
    });
</script>
</body>
</html>

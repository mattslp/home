  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #fdfdfd;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100vh;
      border: none;
    }

    /* ── Facebook browser banner ───────────────────────── */
    #fb-banner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #020202;
      color: #fdfdfd;
      padding: 14px 16px;
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 12px;
      text-align: center;
      z-index: 999999;
      line-height: 1.6;
    }
    #fb-banner a {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 18px;
      background: #cc3399;
      color: #fdfdfd;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      font-size: 12px;
    }

    /* ── Splash overlay ─────────────────────────────────── */
    #sl-splash {
      position: fixed;
      inset: 0;
      background: #fdfdfd;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 99999;
      transition: opacity 0.5s ease;
    }

    #sl-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #sl-splash svg {
      width: 110px;
      height: 110px;
    }

    #sl-splash .maskl   { fill: #cc3399; }
    #sl-splash .maskr   { fill: #00aa99; }
    #sl-splash .maskbg { fill: #fdfdfd; }

    #sl-splash-label {
      font-family: 'komet', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #020202;
      opacity: 0.45;
    }

    /* ── Pure CSS bob animation ─────────────────────────── */
    @keyframes sl-bob-up {
      0%, 100% { transform: translateY(0)    scale(1);    }
      50%       { transform: translateY(-14px) scale(1.07); }
    }
    @keyframes sl-bob-down {
      0%, 100% { transform: translateY(0)   scale(1);    }
      50%       { transform: translateY(14px) scale(0.93); }
    }

    #sl-rightmask-cont {
      animation: sl-bob-up   1.7s ease-in-out infinite;
      transform-origin: 50% 50%;
      transform-box: fill-box;
    }
    #sl-leftmask-cont {
      animation: sl-bob-down 1.7s ease-in-out infinite;
      transform-origin: 50% 50%;
      transform-box: fill-box;
    }
  </style>

  <iframe
    id="trackerFrame"

    title="Street Lamp Time Tracker"
    allow="clipboard-write"
  ></iframe>

  <script>
    function slHideSplash() {
      var splash = document.getElementById('sl-splash');
      if (splash && !splash.classList.contains('hidden')) {
        splash.classList.add('hidden');
        setTimeout(function() { if (splash.parentNode) splash.remove(); }, 600);
      }
    }

    // Primary: appReady message from iframe
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'appReady') {
        slHideSplash();
      }
      if (e.data && e.data.type === 'resize') {
        var frame = document.getElementById('trackerFrame');
        if (frame) frame.style.height = (e.data.height + 50) + 'px';
      }
      if (e.data && e.data.type === 'scrollTop') {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // Fallback A: iframe load event + 3.5s for app init to complete
    document.getElementById('trackerFrame').addEventListener('load', function() {
      setTimeout(slHideSplash, 3500);
    });

    // Fallback B: hard 12s timeout for restricted browsers (Facebook etc.)
    setTimeout(slHideSplash, 6500);

    // Detect Facebook in-app browser and show banner
    (function() {
      var ua = navigator.userAgent || '';
      var isFacebook = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1 || ua.indexOf('FB_IAB') > -1;
      if (isFacebook) {
        var banner = document.getElementById('fb-banner');
        var link   = document.getElementById('fb-open-link');
        if (banner) banner.style.display = 'block';
        // Build a link that opens in the default browser
        if (link) {
          var url = window.location.href;
          // On iOS, intent links don't work — just show the URL to copy
          var isIOS = /iPad|iPhone|iPod/.test(ua);
          if (isIOS) {
            link.href = url;
            link.target = '_blank'; // best effort on iOS
          } else {
            // Android: use intent to open in Chrome
            link.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
          }
        }
      }
    })();
  </script>
